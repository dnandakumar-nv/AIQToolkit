# =============================================================================
# DYNAMO WORKFLOW WITH DYNAMIC PREFIX HEADERS
# =============================================================================
# Purpose: Demonstrates KV cache prefix routing optimization with linear graph.
#          Each successive LLM call extends the previous prefix, maximizing
#          intra-run cache reuse. The large system prompt (~5000 tokens) also
#          enables inter-run cache reuse across evaluation scenarios.
#
# Key Features:
# - prefix_template: "linear-agent-{uuid}" - Unique prefix per request
# - prefix_total_requests: 7 - Exactly 7 LLM calls per graph traversal
# - prefix_osl: HIGH - Higher output since model produces detailed reviews
# - prefix_iat: LOW - Sequential calls arrive quickly within a run
#
# Usage:
#   nat workflow run --config_file configs/config_dynamo_prefix.yml \
#     --input "Review this microservices architecture proposal..."
# =============================================================================

llms:
  dynamo_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048
    # Dynamic prefix headers for KV cache optimization
    prefix_template: "linear-agent-{uuid}"
    prefix_total_requests: 7
    prefix_osl: HIGH
    prefix_iat: LOW

workflow:
  _type: linear_langgraph_agent
  llm_name: dynamo_llm
