llms:
  dynamo_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048

workflow:
  _type: linear_langgraph_agent
  llm_name: dynamo_llm
