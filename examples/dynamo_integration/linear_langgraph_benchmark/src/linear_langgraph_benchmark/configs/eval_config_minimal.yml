# =============================================================================
# MINIMAL TEST - 3 SCENARIOS (Smoke Test)
# =============================================================================
# Purpose: Quick validation of linear agent execution with 3 architecture proposals
# Expected: Exactly 7 LLM calls per scenario (21 total)
# Expected runtime: ~2-3 minutes
#
# Usage:
#   nat eval run --config_file configs/eval_config_minimal.yml
# =============================================================================

llms:
  dynamo_llm:
    _type: dynamo
    model_name: qwen3
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048
    prefix_template: "linear-bench-{uuid}"
    # Static fallback values (used when prediction trie lookup fails)
    prefix_total_requests: 7
    prefix_osl: HIGH
    prefix_iat: LOW

workflow:
  _type: linear_langgraph_agent
  llm_name: dynamo_llm

eval:
  general:
    max_concurrency: 3

    output:
      dir: ./examples/dynamo_integration/linear_langgraph_benchmark/outputs/minimal_test/

    dataset:
      _type: json
      file_path: ./examples/dynamo_integration/linear_langgraph_benchmark/src/linear_langgraph_benchmark/data/linear_langgraph_benchmark_mini.json
      structure:
        disable: true

    profiler:
      compute_llm_metrics: true
      csv_exclude_io_text: true
      bottleneck_analysis:
        enable_nested_stack: true
      prediction_trie:
        enable: true

  evaluators:
    avg_llm_latency:
      _type: avg_llm_latency
    avg_workflow_runtime:
      _type: avg_workflow_runtime
    avg_num_llm_calls:
      _type: avg_num_llm_calls
    avg_tokens_per_llm_end:
      _type: avg_tokens_per_llm_end
