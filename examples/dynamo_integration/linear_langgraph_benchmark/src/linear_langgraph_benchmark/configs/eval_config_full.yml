# =============================================================================
# FULL EVALUATION - 100 SCENARIOS
# =============================================================================
# Purpose: Full benchmark evaluation with 100 architecture proposals for
#          stress-testing Dynamo KV cache prefix reuse optimizations.
#
# KV Cache Strategy:
# - Intra-run: Each of 7 calls extends the previous prefix -> 100% prefix hit
# - Inter-run: System prompt (~5000 tokens) is identical across all 100 runs
# - ISL profile: Grows from ~8,500 tokens (node 1) to ~16,500 tokens (node 7)
# - OSL profile: ~800-1,500 tokens per node, ~7,700 total output per run
#
# Expected: Exactly 7 LLM calls per scenario (700 total)
# Expected runtime: ~30-60 minutes depending on Dynamo configuration
#
# Usage:
#   nat eval run --config_file configs/eval_config_full.yml
# =============================================================================

llms:
  dynamo_llm:
    _type: dynamo
    model_name: qwen3
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048
    prefix_template: "linear-bench-{uuid}"
    latency_log_path: ./load_pin.jsonl
    # Static fallback values (used when prediction trie lookup fails)
    prefix_total_requests: 7
    prefix_osl: HIGH
    prefix_iat: LOW
    prediction_trie_path: ./examples/dynamo_integration/linear_langgraph_benchmark/outputs/minimal_test/prediction_trie.json


workflow:
  _type: linear_langgraph_agent
  llm_name: dynamo_llm

eval:
  general:
    max_concurrency: 3

    output:
      dir: ./examples/dynamo_integration/linear_langgraph_benchmark/outputs/full_eval/

    dataset:
      _type: json
      file_path: ./examples/dynamo_integration/linear_langgraph_benchmark/src/linear_langgraph_benchmark/data/linear_langgraph_benchmark.json
      structure:
        disable: true

    profiler:
      compute_llm_metrics: true
      token_uniqueness_forecast: true
      workflow_runtime_forecast: true
      csv_exclude_io_text: true
      prompt_caching_prefixes:
        enable: true
        min_frequency: 0.1
      bottleneck_analysis:
        enable_nested_stack: true
      concurrency_spike_analysis:
        enable: true
        spike_threshold: 5
      prediction_trie:
        enable: true

  evaluators:
    avg_llm_latency:
      _type: avg_llm_latency
    avg_workflow_runtime:
      _type: avg_workflow_runtime
    avg_num_llm_calls:
      _type: avg_num_llm_calls
    avg_tokens_per_llm_end:
      _type: avg_tokens_per_llm_end
