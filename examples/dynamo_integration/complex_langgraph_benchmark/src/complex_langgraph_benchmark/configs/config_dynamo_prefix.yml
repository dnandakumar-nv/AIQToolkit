# =============================================================================
# DYNAMO WORKFLOW WITH DYNAMIC PREFIX HEADERS
# =============================================================================
# Purpose: Demonstrates automatic unique prefix ID generation per request
#          for KV cache prefix routing optimization with complex graph topology
#
# Key Features:
# - prefix_template: "complex-agent-{uuid}" - Unique prefix per request
# - prefix_total_requests: 12 - Expected LLM calls per graph traversal
# - prefix_osl/prefix_iat: Hints for output length and arrival time
#
# Usage:
#   nat workflow run --config_file configs/config_dynamo_prefix.yml \
#     --input "Critical: API gateway returning 502 errors, 40% of requests failing"
# =============================================================================

function_groups:
  incident_tools:
    _type: incident_tools_group
    decision_only: true

llms:
  dynamo_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048
    # Dynamic prefix headers for KV cache optimization
    prefix_template: "complex-agent-{uuid}"
    prefix_total_requests: 12
    prefix_osl: MEDIUM
    prefix_iat: LOW

workflow:
  _type: complex_langgraph_agent
  llm_name: dynamo_llm
  decision_only: true
