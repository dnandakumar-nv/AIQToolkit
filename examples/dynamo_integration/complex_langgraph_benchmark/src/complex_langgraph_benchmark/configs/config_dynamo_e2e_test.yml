# =============================================================================
# BASIC DYNAMO WORKFLOW CONFIGURATION
# =============================================================================
# Purpose: Simple workflow for testing basic Dynamo connectivity with the
#          complex LangGraph benchmark agent
# Usage:
#   nat workflow run --config_file configs/config_dynamo_e2e_test.yml \
#     --input "Database primary node is unresponsive, read replicas lagging"
# =============================================================================

function_groups:
  incident_tools:
    _type: incident_tools_group
    decision_only: true

llms:
  dynamo_llm:
    _type: dynamo
    model_name: llama-3.3-70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048

workflow:
  _type: complex_langgraph_agent
  llm_name: dynamo_llm
  decision_only: true
