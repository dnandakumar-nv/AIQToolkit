# =============================================================================
# MINIMAL TEST - 3 SCENARIOS (Smoke Test)
# =============================================================================
# Purpose: Quick validation of agent execution with 3 representative incidents
# Expected runtime: ~2-3 minutes
#
# Usage:
#   nat eval run --config_file configs/eval_config_minimal.yml
# =============================================================================

function_groups:
  incident_tools:
    _type: incident_tools_group
    decision_only: true

llms:
  dynamo_llm:
    _type: dynamo
    model_name: llama_70b
    base_url: http://localhost:8099/v1
    api_key: dummy
    temperature: 0.0
    max_tokens: 2048
    prefix_template: "complex-bench-{uuid}"
    # Static fallback values (used when prediction trie lookup fails)
    prefix_total_requests: 12
    prefix_osl: MEDIUM
    prefix_iat: LOW
    # Prediction trie for dynamic per-call header injection
    # Generated by running this config with prediction_trie.enable: true
    # To regenerate: run eval, then update the job ID path below
    prediction_trie_path: ./examples/dynamo_integration/complex_langgraph_benchmark/outputs/minimal_test/jobs/job_bdee9d99-ec8a-492b-b643-f3b9ab5bd975/prediction_trie.json


workflow:
  _type: complex_langgraph_agent
  llm_name: dynamo_llm
  decision_only: true

eval:
  general:
    max_concurrency: 3

    output:
      dir: ./examples/dynamo_integration/complex_langgraph_benchmark/outputs/minimal_test/
      cleanup: false
      job_management:
        append_job_id_to_output_dir: true

    dataset:
      _type: json
      file_path: ./examples/dynamo_integration/complex_langgraph_benchmark/data/complex_langgraph_benchmark_mini.json
      structure:
        disable: true

    profiler:
      compute_llm_metrics: true
      csv_exclude_io_text: true
      bottleneck_analysis:
        enable_nested_stack: true
      prediction_trie:
        enable: true

  evaluators:
    avg_llm_latency:
      _type: avg_llm_latency
    avg_workflow_runtime:
      _type: avg_workflow_runtime
    avg_num_llm_calls:
      _type: avg_num_llm_calls
    avg_tokens_per_llm_end:
      _type: avg_tokens_per_llm_end
